# JPA/Hibernate Configuration
# During development we previously used `update` to allow Hibernate to create
# and alter tables automatically.  The `joining_date` column is now managed
# explicitly by `DatabaseUpdateConfig` and the application is expected to be
# run once with the column created (or migrated) before switching to a stricter
# strategy such as `validate` or `none` in production.  Leaving this as `update`
# after the column exists is harmless, but you can change it to:
#
#   spring.jpa.hibernate.ddl-auto=validate
#
# to prevent any further DDL modifications by Hibernate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
# Render (and many container platforms) provides the port via the PORT env var.
# Fall back to 8080 when PORT is not set (local development).
server.port=${PORT:8080}

# Optimization for Render Free Tier (Faster Startup)
spring.main.lazy-initialization=true
