# Local Development Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/office_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Test with H2 database first (comment out MySQL above and uncomment H2 below)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Local JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Local Server Configuration
server.port=8082

# Enable H2 Console for local development (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console